name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze:
    name: Analyze and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format
        run: dart format --output=none --set-exit-if-changed .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Test
        run: flutter test
